<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">NEXUS<span>.</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Inicio</a></li>
      <li><a href="pages/create.html">Nueva Publicación</a></li>
      <li><a href="pages/about.html">Acerca de</a></li>
    </ul>
    <button class="nav-hamburger" id="hamburger">&#9776;</button>
  </nav>

  <header class="hero">
    <div class="hero-text">
      <p class="hero-eyebrow">Bienvenido a</p>
      <h1>Nexus <em>Blog</em></h1>
      <p class="hero-sub">Ideas, historias y perspectivas del mundo digital.</p>
    </div>
    <div class="hero-deco"></div>
  </header>

  <main class="main-layout">

    <section class="filters-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar publicaciones..." />
      <div class="filter-group">
        <select id="tagFilter" class="filter-select">
          <option value="">Todas las etiquetas</option>
        </select>
        <select id="userFilter" class="filter-select">
          <option value="">Todos los autores</option>
        </select>
        <select id="sortFilter" class="filter-select">
          <option value="default">Ordenar por</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="most-liked">Más gustados</option>
        </select>
      </div>
      <button id="clearFilters" class="btn-outline">Limpiar filtros</button>
    </section>

    <div id="toast" class="toast hidden"></div>
    <div id="loadingIndicator" class="loading-spinner">
      <div class="spinner"></div>
      <p>Cargando publicaciones...</p>
    </div>
    <div id="errorMsg" class="error-box hidden"></div>

    <section id="postsGrid" class="posts-grid"></section>

    <div class="pagination" id="pagination"></div>

  </main>

  <footer class="footer">
    <p>© 2026 Nexus Blog · Sistemas y Tecnologías Web · UVG</p>
  </footer>

  <script type="module" src="js/home.js"></script>
</body>
</html>
